name: Deploy Ziyarat-Terra Corpus

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Validate JSON lexicon
        run: |
          python3 -c "
          import json
          with open('glossary/ziyarat_semantic_lexicon_v1.0.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          terms = len(data['terms'])
          langs = data['metadata']['language_count']
          print(f'вњ“ Lexicon valid: {terms} terms Г— {langs} languages')
          "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
