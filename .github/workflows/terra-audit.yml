name: Terra Audit

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify visible root surface
        run: |
          test -f README.md
          test -f CITATION.cff
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f GOVERNANCE.md
